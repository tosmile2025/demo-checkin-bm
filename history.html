<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ประวัติการบันทึกเวลา</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

  <style>
    /* ซ่อน Scrollbar */
    ::-webkit-scrollbar {
      display: none;
    }

    /* ระบบบล็อกการใช้งานบน Desktop */
    .desktop-warning {
      display: none;
    }

    @media (min-width: 768px) {
      .desktop-warning {
        display: flex !important;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f1f5f9;
        z-index: 9999;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .app-container {
        display: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

  <div class="desktop-warning text-center p-8">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-slate-400 mx-auto mb-4" fill="none"
      viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
    </svg>
    <h2 class="text-2xl font-bold text-slate-700 mb-2">รองรับเฉพาะสมาร์ทโฟน</h2>
    <p class="text-slate-500">กรุณาเปิดลิงก์นี้ผ่านแอปพลิเคชัน LINE</p>
  </div>

  <div class="app-container w-full max-w-md mx-auto p-4 flex flex-col min-h-screen">

    <div class="text-center mb-6 mt-2">
      <h1 class="text-2xl font-bold text-slate-800">ประวัติการบันทึกเวลา</h1>
      <p class="text-sm text-slate-500 mt-1">รายการเช็คอิน - เช็คเอาท์ ของคุณ</p>
    </div>

    <input type="hidden" id="userId" name="userId">

    <div class="bg-slate-800 text-white rounded-2xl shadow-md p-5 mb-6 flex items-center space-x-4">
      <div class="h-12 w-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <div>
        <div class="text-sm text-slate-300 font-light mb-0.5">ข้อมูลสมาชิก</div>
        <div id="name-info" class="font-bold text-lg leading-tight">กำลังโหลด...</div>
        <div id="employee-id-info" class="text-xs text-slate-400 mt-1">-</div>
      </div>
    </div>

    <div class="flex-1">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-100">
            <thead class="bg-slate-50">
              <tr class="text-slate-500 text-xs font-semibold uppercase tracking-wider text-left">
                <th class="py-3 px-4 text-center">สถานะ</th>
                <th class="py-3 px-4">วันที่/เวลา</th>
                <th class="py-3 px-4">หมายเหตุ</th>
              </tr>
            </thead>
            <tbody id="data-table" class="text-sm text-slate-700 divide-y divide-slate-50">
              <tr>
                <td colspan="3" class="py-8 text-center text-slate-400">
                  <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-800 mx-auto mb-2"></div>
                  กำลังดึงข้อมูล...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="pagination-controls" class="mt-6 mb-4 flex flex-wrap justify-center gap-2"></div>

  </div>

  <script src="config.js"></script>
  <script src="history.js"></script>
</body>

</html>
