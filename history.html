<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ประวัติการลงเวลา | ศูนย์แพทย์ พุทธชินราช</title>

  <link rel="icon" type="image/png" href="logo-sm.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] },
          colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } }
        }
      }
    }
  </script>

  <style>
    ::-webkit-scrollbar {
      display: none;
    }

    .desktop-warning {
      display: none;
    }

    @media (min-width: 768px) {
      .desktop-warning {
        display: flex !important;
        position: fixed;
        inset: 0;
        background: #f8fafc;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .app-container {
        display: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

  <div class="desktop-warning text-center p-8">
    <i class="fas fa-mobile-alt text-6xl text-medical-600 mb-4"></i>
    <h2 class="text-2xl font-bold text-slate-700 mb-2">รองรับเฉพาะสมาร์ทโฟน</h2>
    <p class="text-slate-500">กรุณาเปิดระบบผ่านแอปพลิเคชัน LINE</p>
  </div>

  <div class="app-container w-full max-w-md mx-auto flex-1 flex flex-col relative min-h-screen bg-slate-50 shadow-xl">

    <div class="bg-medical-700 text-white p-4 shadow-md sticky top-0 z-40 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="logo-sm.png" class="w-9 h-9 bg-white rounded-lg p-1" onerror="this.style.display='none'">
        <div>
          <h1 class="font-bold text-sm leading-tight">ศูนย์แพทย์ พุทธชินราช พิษณุโลก</h1>
          <p class="text-[10px] text-medical-100">ประวัติการลงเวลาปฏิบัติงาน</p>
        </div>
      </div>
      <button onclick="loadUserDataAndHistory()"
        class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition">
        <i class="fas fa-sync-alt text-sm"></i>
      </button>
    </div>

    <div class="p-4 flex-1 flex flex-col">

      <input type="hidden" id="userId" name="userId">

      <div
        class="bg-medical-800 text-white rounded-2xl shadow-md p-4 mb-5 flex items-center gap-4 relative overflow-hidden">
        <i class="fas fa-stethoscope absolute -right-4 -bottom-4 text-6xl text-white opacity-5"></i>

        <div class="relative flex-shrink-0 z-10">
          <img id="profile-img" src="https://via.placeholder.com/80"
            class="h-16 w-16 rounded-full object-cover border-2 border-white shadow-md bg-white">
        </div>

        <div class="flex-1 min-w-0 z-10">
          <div class="text-[10px] text-medical-200 font-medium mb-0.5 uppercase tracking-wider">ข้อมูลนิสิตแพทย์</div>
          <div id="profile-name" class="font-bold text-base truncate mb-0.5">กำลังโหลดข้อมูล...</div>
          <div id="profile-id" class="text-xs text-medical-100 truncate">-</div>
        </div>
      </div>

      <div class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 border-b border-slate-200 px-4 py-3 flex justify-between items-center">
          <h3 class="font-bold text-slate-700 text-sm"><i class="fas fa-list-ul mr-2 text-medical-500"></i>รายการล่าสุด
          </h3>
          <span id="rowsInfo"
            class="text-[10px] font-bold text-slate-400 bg-white border border-slate-200 px-2 py-1 rounded-md">หน้า
            1/1</span>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-100">
            <thead class="bg-slate-50/50">
              <tr class="text-slate-500 text-[11px] font-bold uppercase tracking-wider text-left">
                <th class="py-3 px-4 text-center w-24">สถานะ</th>
                <th class="py-3 px-4">วัน / เวลา</th>
                <th class="py-3 px-4">หมายเหตุ</th>
              </tr>
            </thead>
            <tbody id="data-table" class="text-sm text-slate-700 divide-y divide-slate-50">
              <tr>
                <td colspan="3" class="py-10 text-center text-slate-400">
                  <div
                    class="animate-spin rounded-full h-8 w-8 border-2 border-medical-200 border-t-medical-600 mx-auto mb-3">
                  </div>
                  กำลังดึงข้อมูลประวัติ...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="pagination-controls" class="mt-4 flex flex-wrap justify-center gap-1.5"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="history.js"></script>
</body>

</html>
