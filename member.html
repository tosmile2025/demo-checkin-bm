<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสมาชิก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-base p-6">
    <div class="container mx-auto max-w-7xl mb-6">
        <a href="Dashboardadmin.html"
            class="inline-block py-3 px-6 rounded-lg bg-black text-white font-semibold hover:bg-gray-800 transition duration-200 ease-in-out">
            ← กลับสู่ Dashboard In-Out
        </a>
    </div>

    <div class="container mx-auto max-w-7xl">
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">จัดการข้อมูลสมาชิก</h1>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                <div>
                    <label for="filter-name" class="block text-sm font-medium text-gray-700 mb-1">ค้นหาตามชื่อ</label>
                    <input type="text" id="filter-name" placeholder="พิมพ์ชื่อนักศึกษา"
                        class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none focus:ring-1 focus:ring-black">
                </div>
                <div>
                    <label for="filter-department"
                        class="block text-sm font-medium text-gray-700 mb-1">ค้นหาตามรหัสนักศึกษา</label>
                    <input type="text" id="filter-employeeID" placeholder="พิมพ์รหัสนักศึกษา"
                        class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none focus:ring-1 focus:ring-black">
                </div>
                <div>
                    <label for="filter-employeeID"
                        class="block text-sm font-medium text-gray-700 mb-1">ค้นหาตามชั้นปี</label>
                    <input type="text" id="filter-department" placeholder="พิมพ์ชั้นปีนักศึกษา"
                        class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none focus:ring-1 focus:ring-black">
                </div>
                <div class="flex flex-col">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รีเซต</label>
                    <button id="reset-leaves"
                        class="bg-black text-white py-2 px-4 rounded-lg hover:bg-gray-800 transition duration-200 font-semibold">วันลา</button>
                </div>
                <div class="flex flex-col">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รีเซต</label>
                    <button id="reset-ot"
                        class="bg-black text-white py-2 px-4 rounded-lg hover:bg-gray-800 transition duration-200 font-semibold">โอที</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table id="data-table" class="min-w-full text-sm whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-100 text-lg font-semibold text-gray-800">
                            <th class="py-4 px-4 border-b border-gray-200 w-12 text-center">ID</th>
                            <th class="py-4 px-4 text-left border-b border-gray-200">ข้อมูลสมาชิก</th>
                            <th class="py-4 px-4 text-left border-b border-gray-200 w-32">ชั้นปี</th>
                            <th class="py-4 px-4 text-center border-b border-gray-200 w-48">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody class="text-base text-gray-700">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="pagination" class="mt-6 flex justify-center space-x-2"></div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-xl">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">แก้ไขข้อมูลพนักงาน</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">UserID Line</label>
                        <input type="text" id="edit-userID"
                            class="w-full rounded-md border border-gray-300 p-2 bg-gray-100 cursor-not-allowed"
                            disabled>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ สกุล</label>
                        <input type="text" id="edit-name"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสประจำตัวนิสิต</label>
                        <input type="text" id="edit-employeeID"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชั้นปี</label>
                        <input type="text" id="edit-department"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ลาพักร้อน (วัน)</label>
                        <input type="number" id="edit-vacationLeave"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none"
                            min="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ลากิจ (วัน)</label>
                        <input type="number" id="edit-personalLeave"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none"
                            min="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ลาป่วย (วัน)</label>
                        <input type="number" id="edit-sickLeave"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none"
                            min="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">โอที (ชั่วโมง)</label>
                        <input type="number" id="edit-ot"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none" min="0"
                            step="0.5">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">กำหนดเข้างาน</label>
                        <input type="time" id="edit-workStart"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">กำหนดออกงาน</label>
                        <input type="time" id="edit-workEnd"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                    </div>
                    <div class="md:col-span-2 lg:col-span-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL รูปภาพ (ถ้ามี)</label>
                        <input type="text" id="edit-imageUrl"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none"
                            placeholder="URL รูปภาพที่มีอยู่ หรือเว้นว่างถ้าอัปโหลดใหม่">
                    </div>
                    <div class="md:col-span-2 lg:col-span-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">อัปโหลดรูปภาพใหม่
                            (ถ้าต้องการเปลี่ยน)</label>
                        <input type="file" id="edit-image" accept="image/png, image/jpeg, image/gif"
                            class="w-full rounded-md border border-gray-300 p-2 focus:border-black outline-none">
                        <img id="preview-image" src="#" alt="Preview"
                            class="mt-3 h-28 w-28 object-cover rounded-md border border-gray-200 hidden" />
                    </div>
                </div>
                <div class="flex justify-end mt-8 space-x-3">
                    <button type="button"
                        class="bg-gray-200 text-gray-800 py-3 px-6 rounded-lg hover:bg-gray-300 font-semibold"
                        onclick="closeEditModal()">ยกเลิก</button>
                    <button type="submit" id="save-button"
                        class="bg-black text-white py-3 px-6 rounded-lg hover:bg-gray-800 font-semibold">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="member.js"></script>
</body>

</html>
