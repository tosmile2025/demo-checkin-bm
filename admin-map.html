<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าพื้นที่ลงเวลา | ศูนย์แพทย์ พุทธชินราช</title>

    <link rel="icon" type="image/png" href="logo-sm.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }, colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } } } }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans p-4 sm:p-8 min-h-screen flex flex-col">

    <div class="max-w-5xl mx-auto w-full">

        <div
            class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div
                    class="bg-medical-50 text-medical-600 w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner border border-medical-100">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800">ตั้งค่าพิกัดจุดลงเวลา</h1>
                    <p class="text-xs text-slate-500 mt-0.5">คลิกที่แผนที่เพื่อย้ายหมุด หรือกรอกพิกัดด้านล่าง</p>
                </div>
            </div>
            <a href="admin.html"
                class="w-full sm:w-auto text-center bg-slate-100 text-slate-700 px-5 py-2.5 rounded-xl font-bold hover:bg-slate-200 transition shadow-sm">
                <i class="fas fa-arrow-left mr-2"></i> กลับแดชบอร์ด
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div
                class="bg-white p-6 rounded-3xl shadow-md border border-slate-100 flex flex-col h-fit relative overflow-hidden">
                <div
                    class="absolute -right-6 -top-6 w-24 h-24 bg-medical-50 rounded-full opacity-50 pointer-events-none">
                </div>

                <h2 class="font-bold text-medical-700 mb-5 text-lg relative z-10"><i class="fas fa-crosshairs mr-2"></i>
                    กำหนดจุดศูนย์กลาง</h2>

                <div class="space-y-5 relative z-10">
                    <div>
                        <label
                            class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 pl-1">ละติจูด
                            (Latitude)</label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <input type="number" id="inputLat"
                                class="w-full bg-slate-50 border border-slate-200 pl-9 p-3 rounded-xl outline-none focus:border-medical-500 focus:ring-1 focus:ring-medical-500 transition font-medium text-slate-700">
                        </div>
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5 pl-1">ลองจิจูด
                            (Longitude)</label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <input type="number" id="inputLng"
                                class="w-full bg-slate-50 border border-slate-200 pl-9 p-3 rounded-xl outline-none focus:border-medical-500 focus:ring-1 focus:ring-medical-500 transition font-medium text-slate-700">
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-100">
                        <label
                            class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2 pl-1">รัศมีที่อนุญาต
                            (เมตร)</label>
                        <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <input type="range" id="inputRangeSlider" min="10" max="500" step="5"
                                class="flex-1 accent-medical-600">
                            <input type="number" id="inputRange"
                                class="w-16 text-center bg-white border border-slate-300 p-1.5 rounded-lg outline-none focus:border-medical-500 font-bold text-medical-700 shadow-sm">
                        </div>
                    </div>
                </div>

                <button onclick="saveSettings()" id="saveBtn"
                    class="w-full mt-8 bg-gradient-to-r from-medical-600 to-medical-700 text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl hover:from-medical-700 hover:to-medical-800 transition transform hover:-translate-y-0.5 relative z-10 flex items-center justify-center">
                    <i class="fas fa-save mr-2 text-lg"></i> บันทึกการตั้งค่า
                </button>
            </div>

            <div class="lg:col-span-2 bg-white p-2.5 rounded-3xl shadow-md border border-slate-100 relative">
                <div id="map"
                    class="w-full h-[400px] lg:h-[550px] rounded-2xl bg-slate-100 z-0 border border-slate-200 shadow-inner">
                </div>

                <div
                    class="absolute top-6 left-6 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-xl shadow-lg border border-slate-100 pointer-events-none z-[1000] flex items-center gap-3">
                    <div class="w-3 h-3 rounded-full bg-rose-500 animate-pulse"></div>
                    <span class="text-xs font-bold text-slate-700">ลากหมุดเพื่อเปลี่ยนตำแหน่ง</span>
                </div>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let map, marker, circle;
        let currentLat = CONFIG.TARGET_LATITUDE;
        let currentLng = CONFIG.TARGET_LONGITUDE;
        let currentRange = CONFIG.ALLOWED_RANGE_METERS;

        const latInput = document.getElementById('inputLat');
        const lngInput = document.getElementById('inputLng');
        const rangeInput = document.getElementById('inputRange');
        const rangeSlider = document.getElementById('inputRangeSlider');

        // ==========================================
        // 🔒 ADMIN AUTHENTICATION
        // ==========================================
        function checkAdminAuth(callback) {
            if (sessionStorage.getItem('adminAuth') === 'true') {
                if (callback) callback();
                return;
            }
            Swal.fire({
                title: '🔒 เข้าสู่ระบบผู้ดูแล',
                input: 'password',
                inputPlaceholder: 'กรอกรหัสผ่าน',
                allowOutsideClick: false,
                allowEscapeKey: false,
                confirmButtonText: 'เข้าสู่ระบบ',
                confirmButtonColor: '#0f766e',
                preConfirm: (password) => {
                    if (password !== '12211') { Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง!'); return false; }
                    return true;
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    sessionStorage.setItem('adminAuth', 'true');
                    if (callback) callback();
                }
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            // บังคับกรอกรหัสก่อนแสดงแผนที่
            checkAdminAuth(async () => {
                initMap();
                await fetchSettings();
            });
        });

        function initMap() {
            map = L.map('map').setView([currentLat, currentLng], 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

            // ใช้หมุดแบบกำหนดสีเอง (สีเขียวแพทย์)
            const medicalIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color:#0f766e; width:24px; height:24px; border-radius:50%; border:3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; color:white; font-size:12px;"><i class="fas fa-hospital"></i></div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            marker = L.marker([currentLat, currentLng], { draggable: true, icon: medicalIcon }).addTo(map);

            // วงกลมรัศมีสีแดงอ่อน
            circle = L.circle([currentLat, currentLng], { color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.15, weight: 2 }).addTo(map);
            circle.setRadius(currentRange);

            marker.on('dragend', function (e) { const pos = marker.getLatLng(); updateInputsAndCircle(pos.lat, pos.lng, currentRange); });
            map.on('click', function (e) { updateInputsAndCircle(e.latlng.lat, e.latlng.lng, currentRange); });

            rangeSlider.addEventListener('input', (e) => {
                currentRange = parseInt(e.target.value); rangeInput.value = currentRange; circle.setRadius(currentRange);
            });
            rangeInput.addEventListener('change', (e) => {
                currentRange = parseInt(e.target.value); rangeSlider.value = currentRange; circle.setRadius(currentRange);
            });

            const updateFromInput = () => {
                updateInputsAndCircle(parseFloat(latInput.value), parseFloat(lngInput.value), currentRange);
                map.panTo([parseFloat(latInput.value), parseFloat(lngInput.value)]);
            };
            latInput.addEventListener('change', updateFromInput);
            lngInput.addEventListener('change', updateFromInput);
        }

        function updateInputsAndCircle(lat, lng, range) {
            currentLat = lat; currentLng = lng; currentRange = range;
            latInput.value = lat.toFixed(6); lngInput.value = lng.toFixed(6);
            rangeInput.value = range; rangeSlider.value = range;
            marker.setLatLng([lat, lng]); circle.setLatLng([lat, lng]); circle.setRadius(range);
        }

        async function fetchSettings() {
            Swal.fire({ title: 'กำลังโหลดข้อมูลพิกัด...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const response = await fetch(CONFIG.WEB_APP_API, { method: "POST", body: JSON.stringify({ action: "getSettings" }) });
                const data = await response.json();
                if (data && data.lat) {
                    updateInputsAndCircle(data.lat, data.lng, data.range);
                    map.setView([data.lat, data.lng], 17);
                }
                Swal.close();
            } catch (error) {
                Swal.fire("ข้อผิดพลาด", "ไม่สามารถดึงข้อมูลพิกัดได้ (ใช้ค่าเริ่มต้นแทน)", "warning");
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2 text-lg"></i> กำลังบันทึก...';

            try {
                await fetch(CONFIG.WEB_APP_API, { method: "POST", body: JSON.stringify({ action: "saveSettings", lat: currentLat, lng: currentLng, range: currentRange }) });
                Swal.fire({ title: "สำเร็จ!", text: "อัปเดตจุดลงเวลาเรียบร้อยแล้ว", icon: "success", timer: 2000, showConfirmButton: false });
            } catch (error) {
                Swal.fire("ข้อผิดพลาด", "บันทึกข้อมูลล้มเหลว", "error");
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-save mr-2 text-lg"></i> บันทึกการตั้งค่า';
            }
        }
    </script>
</body>

</html>
