<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนสมาชิก</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

    <style>
        /* ซ่อน Scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }

        /* ระบบบล็อกการใช้งานบน Desktop */
        .desktop-warning {
            display: none;
        }

        @media (min-width: 768px) {
            .desktop-warning {
                display: flex !important;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #f1f5f9;
                z-index: 9999;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            .app-container {
                display: none !important;
            }
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center">

    <div class="desktop-warning text-center p-8">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-slate-400 mx-auto mb-4" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        <h2 class="text-2xl font-bold text-slate-700 mb-2">รองรับเฉพาะสมาร์ทโฟน</h2>
        <p class="text-slate-500">กรุณาเปิดลิงก์นี้ผ่านแอปพลิเคชัน LINE</p>
    </div>

    <div class="app-container w-full max-w-md p-4">

        <div class="text-center mb-6 mt-4">
            <h1 class="text-2xl font-bold text-slate-800">ลงทะเบียนสมาชิก</h1>
            <p class="text-sm text-slate-500 mt-1">กรอกข้อมูลเพื่อเริ่มต้นใช้งานระบบ</p>
        </div>

        <form id="registerForm" class="bg-white shadow-sm border border-slate-200 rounded-3xl p-6">

            <div class="mb-6 text-center">
                <div
                    class="mx-auto w-32 h-32 mb-3 border-2 border-dashed border-slate-300 rounded-2xl relative bg-slate-50 flex items-center justify-center overflow-hidden">
                    <img src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png"
                        alt="Profile Preview" id="preview" class="h-full w-full object-cover">
                </div>

                <label for="file"
                    class="cursor-pointer inline-flex justify-center items-center px-4 py-2 rounded-xl text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    อัปโหลดรูปโปรไฟล์
                    <input type="file" id="file" name="file" accept="image/*" class="hidden">
                </label>
            </div>

            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">LINE ID (อัตโนมัติ)</label>
                    <input type="text"
                        class="w-full bg-slate-100 border border-slate-200 p-3 text-slate-500 text-sm rounded-xl outline-none cursor-not-allowed"
                        id="userlineId" placeholder="กำลังโหลด..." readonly>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">ชื่อ - นามสกุล</label>
                    <input type="text"
                        class="w-full bg-white border border-slate-300 focus:border-slate-800 p-3 text-sm rounded-xl outline-none transition-colors"
                        id="nameId" placeholder="ระบุชื่อและนามสกุล" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">รหัสประจำตัว นสพ.</label>
                    <input type="text"
                        class="w-full bg-white border border-slate-300 focus:border-slate-800 p-3 text-sm rounded-xl outline-none transition-colors"
                        id="keynumberId" placeholder="ระบุรหัสประจำตัว" required>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 ml-1">ชั้นปี</label>
                    <input type="text"
                        class="w-full bg-white border border-slate-300 focus:border-slate-800 p-3 text-sm rounded-xl outline-none transition-colors"
                        id="keynumber2Id" placeholder="ระบุชั้นปี" required>
                </div>
            </div>

            <button type="button" id="submitBtn"
                class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md hover:bg-slate-900 transition-colors">
                บันทึกข้อมูล
            </button>
        </form>
    </div>

    <script src="config.js"></script>
    <script src="register.js"></script>
</body>

</html>
