<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mobile Admin | ศูนย์แพทย์ พุทธชินราช</title>
  <link rel="icon" type="image/png" href="logo-sm.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }, colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } } } } }
  </script>
  <style>
    ::-webkit-scrollbar {
      display: none;
    }

    body {
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

  <div class="bg-medical-700 text-white p-5 shadow-md z-20 flex justify-between items-center flex-shrink-0">
    <div class="flex items-center gap-4">
      <img src="logo-sm.png" class="w-12 h-12 bg-white rounded-xl p-1 shadow-sm" onerror="this.style.display='none'">
      <div>
        <h1 class="font-bold text-base leading-tight">จัดการเวลา (Mobile)</h1>
        <p class="text-xs text-medical-100 mt-0.5">ศูนย์แพทย์ พุทธชินราช</p>
      </div>
    </div>
    <button onclick="fetchDataAndDisplay()"
      class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-base active:bg-white/40 transition"><i
        class="fas fa-sync-alt"></i></button>
  </div>

  <div class="bg-white px-5 py-4 shadow-sm z-10 flex-shrink-0">
    <div class="flex gap-2 mb-4">
      <div class="relative flex-1">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 text-lg"><i
            class="fas fa-search"></i></div>
        <input type="text" id="searchInput"
          class="w-full bg-slate-50 border border-slate-200 pl-11 p-3 rounded-xl text-sm outline-none focus:border-medical-500 transition"
          placeholder="ค้นหาชื่อ, รหัสนิสิต...">
      </div>
      <div class="flex-shrink-0 w-36">
        <input type="date" id="filterDate"
          class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-xs outline-none focus:border-medical-500 transition text-slate-600 font-medium">
      </div>
    </div>

    <div class="flex gap-2.5 overflow-x-auto pb-1" id="filterTabs">
      <button onclick="setFilter('all', this)"
        class="tab-btn px-5 py-2 rounded-full text-sm font-bold bg-medical-600 text-white whitespace-nowrap shadow-sm">ทั้งหมด</button>
      <button onclick="setFilter('ราว ward', this)"
        class="tab-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-500 whitespace-nowrap">ราว
        ward</button>
      <button onclick="setFilter('เข้าเวร', this)"
        class="tab-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-500 whitespace-nowrap">เข้าเวร</button>
      <button onclick="setFilter('ออกเวร', this)"
        class="tab-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-500 whitespace-nowrap">ออกเวร</button>
      <button onclick="setFilter('late', this)"
        class="tab-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-100 text-slate-500 whitespace-nowrap">สาย/ออกก่อน</button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-4 pb-28" id="dataList">
    <div class="flex flex-col items-center justify-center h-full text-slate-400">
      <div class="animate-spin rounded-full h-10 w-10 border-4 border-medical-200 border-t-medical-600 mb-4"></div>
      <p class="text-base font-bold">กำลังโหลดข้อมูล...</p>
    </div>
  </div>

  <div
    class="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 flex justify-around items-center h-20 pb-safe z-20 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
    <a href="admin-m.html" class="flex flex-col items-center justify-center w-full h-full text-medical-600">
      <i class="fas fa-list text-xl mb-1.5"></i><span class="text-xs font-bold">รายการ</span>
    </a>
    <a href="admin-map.html"
      class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-medical-600 transition">
      <i class="fas fa-map-marker-alt text-xl mb-1.5"></i><span class="text-xs font-bold">แผนที่</span>
    </a>
    <a href="member.html"
      class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-medical-600 transition">
      <i class="fas fa-user-md text-xl mb-1.5"></i><span class="text-xs font-bold">นิสิต</span>
    </a>
    <a href="admin.html"
      class="flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-medical-600 transition">
      <i class="fas fa-desktop text-xl mb-1.5"></i><span class="text-xs font-bold">โหมด PC</span>
    </a>
  </div>

  <div id="modalOverlay" class="fixed inset-0 bg-black/60 z-40 hidden opacity-0 transition-opacity duration-300"
    onclick="closeModal()"></div>
  <div id="detailModal"
    class="fixed bottom-0 inset-x-0 bg-white rounded-t-[2rem] z-50 bottom-sheet flex flex-col max-h-[85vh]">
    <div class="flex justify-center pt-4 pb-2">
      <div class="w-16 h-1.5 bg-slate-200 rounded-full"></div>
    </div>

    <div class="p-6 overflow-y-auto">
      <div class="flex justify-center gap-5 mb-5">
        <div class="relative text-center">
          <img id="m-profileImg" src=""
            class="w-20 h-20 rounded-full object-cover border-2 border-slate-200 shadow-sm mx-auto">
          <span
            class="bg-slate-600 text-white text-[11px] px-3 py-1 rounded-full absolute -bottom-2.5 left-1/2 -translate-x-1/2 shadow">โปรไฟล์</span>
        </div>
        <div class="relative text-center">
          <img id="m-checkinImg" src=""
            class="w-20 h-20 rounded-full object-cover border-2 border-medical-500 shadow-sm mx-auto">
          <span
            class="bg-medical-600 text-white text-[11px] px-3 py-1 rounded-full absolute -bottom-2.5 left-1/2 -translate-x-1/2 shadow">เช็คอิน</span>
        </div>
      </div>

      <div class="text-center border-b border-slate-100 pb-5 mb-5 mt-2">
        <h3 id="m-name" class="font-bold text-xl text-slate-800">ชื่อนิสิต</h3>
        <p id="m-id" class="text-sm text-slate-500 font-medium mt-1">รหัส: 00000 | ปี -</p>
      </div>

      <div class="space-y-3.5 text-base">
        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-xl border border-slate-100">
          <span class="text-slate-500 font-bold"><i class="fas fa-tag w-6"></i> สถานะ</span>
          <span id="m-status" class="font-bold text-medical-700">เข้างาน</span>
        </div>
        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-xl border border-slate-100">
          <span class="text-slate-500 font-bold"><i class="far fa-calendar w-6"></i> วันที่/เวลา</span>
          <div class="text-right">
            <div id="m-date" class="font-bold text-slate-800 text-sm">01/01/2024</div>
            <div id="m-time" class="font-bold text-medical-600 text-base mt-0.5">08:00 น.</div>
          </div>
        </div>
        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-xl border border-slate-100">
          <span class="text-slate-500 font-bold"><i class="fas fa-hourglass-half w-6"></i> ความล่าช้า</span>
          <span id="m-delay" class="font-bold">-</span>
        </div>
        <div class="pt-2">
          <span class="text-slate-500 font-bold text-sm"><i class="fas fa-map-marker-alt w-5"></i> สถานที่พิกัด</span>
          <p id="m-location"
            class="mt-2 text-sm text-slate-700 bg-blue-50 p-3 rounded-xl border border-blue-100 leading-relaxed">
            กำลังโหลด...</p>
        </div>
        <div class="pt-1">
          <span class="text-slate-500 font-bold text-sm"><i class="fas fa-comment-dots w-5"></i> หมายเหตุ</span>
          <p id="m-note" class="mt-2 text-sm text-amber-800 bg-amber-50 p-3 rounded-xl border border-amber-100">-</p>
        </div>
      </div>
      <button onclick="closeModal()"
        class="w-full mt-8 bg-slate-800 text-white text-lg font-bold py-4 rounded-2xl active:bg-slate-900 transition shadow-lg">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="admin-m.js"></script>
</body>

</html>
