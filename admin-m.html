<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard (Mobile)</title>

  <link rel="icon" type="image/png" href="logo-sm.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    /* จุดสีสถานะบนรูปภาพ */
    .status-dot {
      position: absolute;
      bottom: 0px;
      right: 0px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .dot-green {
      background-color: #22c55e;
    }

    /* เข้างาน */
    .dot-red {
      background-color: #ef4444;
    }

    /* ออกงาน */
    .dot-yellow {
      background-color: #f59e0b;
    }

    /* ระหว่างวัน */
    .dot-gray {
      background-color: #94a3b8;
    }

    /* Modal Animation */
    .modal-overlay {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">

  <div class="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-40">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-bold">ข้อมูลลงเวลา <span class="font-normal text-sm text-slate-300 ml-1">วันนี้</span>
      </h1>
      <button onclick="fetchDataAndDisplay()"
        class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition">
        <i class="fas fa-sync-alt text-sm"></i>
      </button>
    </div>
  </div>

  <div class="max-w-md mx-auto w-full p-4 flex-1 flex flex-col">

    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-slate-200">
      <div class="flex flex-col gap-3">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
            <i class="fas fa-search"></i>
          </span>
          <input id="filterSearch" type="search"
            class="w-full rounded-xl bg-slate-50 border border-slate-200 p-2.5 pl-10 text-sm focus:outline-none focus:border-slate-800 focus:ring-1 focus:ring-slate-800 transition"
            placeholder="ค้นหาชื่อ หรือ รหัสนิสิต..." />
        </div>

        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
            <i class="far fa-calendar-alt"></i>
          </span>
          <input id="filterDate" type="date"
            class="w-full rounded-xl bg-slate-50 border border-slate-200 p-2.5 pl-10 text-sm text-slate-600 focus:outline-none focus:border-slate-800 focus:ring-1 focus:ring-slate-800 transition" />
        </div>
      </div>
    </div>

    <div id="loading" class="flex flex-col items-center justify-center py-12">
      <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-slate-800 mb-3"></div>
      <p class="text-slate-500 text-sm font-medium">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="no-data"
      class="hidden flex-col items-center justify-center py-12 bg-white rounded-2xl border border-slate-200 border-dashed">
      <i class="fas fa-folder-open text-4xl text-slate-300 mb-3"></i>
      <p class="text-slate-500 text-sm">ไม่พบข้อมูลที่ค้นหา</p>
    </div>

    <div id="data-container" class="hidden flex-col gap-3 pb-6 flex-1">
    </div>

    <div id="pagination-controls"
      class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-3 mt-auto flex items-center justify-between">
      <button id="prevPageBtn"
        class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center">
        <i class="fas fa-chevron-left text-sm"></i>
      </button>
      <span id="rowsInfo" class="text-xs font-bold text-slate-600">1 / 1</span>
      <button id="nextPageBtn"
        class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center">
        <i class="fas fa-chevron-right text-sm"></i>
      </button>
    </div>

  </div>

  <div id="popupModal"
    class="modal-overlay fixed inset-0 z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div id="popupContent"
      class="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">

      <div class="relative bg-slate-800 h-20">
        <button id="closePopup"
          class="absolute top-3 right-3 text-white/70 hover:text-white bg-black/20 hover:bg-black/40 rounded-full w-8 h-8 flex items-center justify-center transition">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="px-6 pb-6 relative pt-0">
        <div class="flex justify-center -mt-12 mb-3">
          <div class="relative">
            <img id="modalImg" src=""
              class="h-24 w-24 rounded-full object-cover border-4 border-white shadow-md bg-white">
            <div id="modalStatusDot" class="status-dot w-5 h-5 border-4"></div>
          </div>
        </div>

        <div class="text-center mb-5 border-b border-slate-100 pb-4">
          <h3 id="modalName" class="text-xl font-bold text-slate-800">ชื่อพนักงาน</h3>
          <p id="modalId" class="text-sm text-slate-500 mt-0.5">รหัส: 00000</p>
        </div>

        <div class="space-y-3 text-sm">
          <div class="flex justify-between items-center">
            <span class="text-slate-500"><i class="fas fa-tag w-5"></i> สถานะ</span>
            <span id="modalStatusBadge" class="font-bold px-2.5 py-1 rounded-md text-xs">สถานะ</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-500"><i class="far fa-calendar w-5"></i> วันที่</span>
            <span id="modalDate" class="font-semibold text-slate-800">01/01/2024</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-500"><i class="far fa-clock w-5"></i> เวลา</span>
            <span id="modalTime" class="font-semibold text-slate-800">08:00 น.</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-500"><i class="fas fa-hourglass-half w-5"></i> ความล่าช้า</span>
            <span id="modalDelay" class="font-semibold">-</span>
          </div>

          <div class="mt-4 pt-3 border-t border-slate-100">
            <p class="text-xs text-slate-500 mb-1"><i class="fas fa-map-marker-alt"></i> สถานที่</p>
            <p id="modalLocation" class="text-xs text-slate-700 leading-relaxed bg-slate-50 p-2 rounded-lg">
              กำลังโหลดพิกัด...</p>
          </div>

          <div class="mt-2">
            <p class="text-xs text-slate-500 mb-1"><i class="fas fa-comment-dots"></i> หมายเหตุ</p>
            <p id="modalNote"
              class="text-xs text-slate-700 leading-relaxed bg-amber-50 text-amber-800 border border-amber-100 p-2 rounded-lg">
              -</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="admin-m.js"></script>
</body>

</html>
