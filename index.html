<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลงเวลาปฏิบัติงาน | ศูนย์แพทย์ พุทธชินราช</title>

  <link rel="icon" type="image/png" href="logo-sm.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] }, colors: { medical: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } } } }
    }
  </script>

  <style>
    ::-webkit-scrollbar {
      display: none;
    }

    body {
      -webkit-tap-highlight-color: transparent;
    }

    .pulsing-dot {
      width: 14px;
      height: 14px;
      background-color: #3b82f6;
      border-radius: 50%;
      box-shadow: 0 0 0 rgba(59, 130, 246, 0.4);
      animation: pulse 1.5s infinite;
      border: 2px solid white;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    .desktop-warning {
      display: none;
    }

    @media (min-width: 768px) {
      .desktop-warning {
        display: flex !important;
        position: fixed;
        inset: 0;
        background: #f8fafc;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .app-container {
        display: none !important;
      }
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 antialiased min-h-screen flex flex-col items-center">

  <div class="desktop-warning text-center p-8">
    <i class="fas fa-mobile-alt text-6xl text-medical-600 mb-4"></i>
    <h2 class="text-2xl font-bold text-slate-700 mb-2">รองรับเฉพาะสมาร์ทโฟน</h2>
    <p class="text-slate-500">กรุณาเปิดระบบผ่านแอปพลิเคชัน LINE</p>
  </div>

  <div id="loadingView"
    class="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center transition-opacity duration-500">
    <div id="loadingContent" class="flex flex-col items-center w-full px-8">
      <img src="logo-sm.png" class="w-24 h-24 mb-6 drop-shadow-md animate-pulse" onerror="this.style.display='none'">
      <div class="w-full max-w-xs bg-slate-200 rounded-full h-2.5 mb-4 overflow-hidden shadow-inner">
        <div id="loadingProgress" class="bg-medical-600 h-2.5 rounded-full transition-all duration-300 ease-out"
          style="width: 5%"></div>
      </div>
      <h2 id="loadingText" class="text-xl font-bold text-slate-700 mb-1">กำลังเตรียมระบบ...</h2>
      <p id="loadingSubText" class="text-sm text-slate-500 font-medium">เริ่มต้นการทำงาน</p>
    </div>
    <div id="loadingError" class="hidden flex-col items-center w-full px-8 mt-4">
      <div class="bg-rose-50 border border-rose-200 p-5 rounded-2xl max-w-xs w-full text-center shadow-sm">
        <i class="fas fa-exclamation-triangle text-rose-500 text-3xl mb-3"></i>
        <h3 class="text-base font-bold text-rose-700 mb-1">เกิดข้อผิดพลาด!</h3>
        <p id="loadingErrorText" class="text-xs text-rose-600/80 mb-4 leading-relaxed">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้
        </p>
        <button onclick="location.reload()"
          class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-2.5 rounded-xl transition shadow-md">
          <i class="fas fa-sync-alt mr-2"></i> โหลดใหม่อีกครั้ง
        </button>
      </div>
    </div>
  </div>

  <div
    class="app-container w-full max-w-md bg-slate-50 min-h-screen shadow-2xl relative flex flex-col overflow-hidden hidden"
    id="registerView">
    <div class="bg-medical-700 text-white p-5 rounded-b-[2rem] shadow-md relative z-10">
      <div class="flex items-center gap-4">
        <img src="logo-sm.png" class="w-12 h-12 bg-white rounded-xl shadow-sm p-1" onerror="this.style.display='none'">
        <div>
          <h1 class="text-lg font-bold">ลงทะเบียนนิสิตแพทย์</h1>
          <p class="text-[11px] text-medical-100">ศูนย์แพทยศาสตรศึกษาชั้นคลินิก</p>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-6 pb-24">
      <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-6">
        <div
          class="relative bg-slate-200 rounded-3xl overflow-hidden aspect-[3/4] shadow-inner border-4 border-white mb-6">
          <video id="reg-camera-preview" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline
            webkit-playsinline muted></video>
          <img id="reg-preview" class="absolute inset-0 w-full h-full object-cover hidden">

          <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"
            id="reg-camera-guide">
            <div class="w-48 h-56 border-2 border-dashed border-white/70 rounded-full mb-4"></div>
            <p class="text-white text-xs font-bold bg-black/40 px-3 py-1 rounded-full backdrop-blur-sm">
              ถ่ายรูปใบหน้าให้ชัดเจน</p>
          </div>

          <div class="absolute bottom-4 right-4 flex gap-2 z-10">
            <button onclick="toggleMirror('reg')"
              class="bg-white/20 hover:bg-white/40 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-lg border border-white/30">
              <i class="fas fa-arrows-alt-h"></i>
            </button>
            <button onclick="switchCamera('reg')"
              class="bg-white/20 hover:bg-white/40 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-lg border border-white/30">
              <i class="fas fa-sync-alt"></i>
            </button>
          </div>

          <button id="reg-capture-btn"
            class="absolute bottom-4 left-1/2 -translate-x-1/2 w-14 h-14 bg-white/30 rounded-full border-4 border-white backdrop-blur-sm hover:bg-white/50 transition z-10 shadow-lg"></button>
          <button id="reg-retake-btn"
            class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-slate-800/80 text-white px-4 py-2 rounded-full font-bold text-xs backdrop-blur-sm hover:bg-slate-900 transition z-10 hidden shadow-lg"><i
              class="fas fa-undo mr-1"></i> ถ่ายใหม่</button>
        </div>

        <div class="space-y-4">
          <input type="hidden" id="reg-lineId">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">ชื่อ - นามสกุล <span
                class="text-rose-500">*</span></label>
            <input type="text" id="reg-name"
              class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-sm focus:border-medical-500 outline-none transition font-medium"
              placeholder="เช่น นพ.ใจดี รักษา">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">รหัสประจำตัว (ถ้ามี) <span
                class="text-rose-500">*</span></label>
            <input type="tel" id="reg-empId"
              class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-sm focus:border-medical-500 outline-none transition font-medium"
              placeholder="เช่น 6401001 หรือ 0000">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">ตำแหน่ง / ชั้นปี <span
                class="text-rose-500">*</span></label>
            <select id="reg-dept"
              class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl text-sm focus:border-medical-500 outline-none transition font-medium text-slate-700">
              <option value="" disabled selected>-- เลือกตำแหน่ง / ชั้นปี --</option>
              <option value="นพท. ปี 4">นิสิตแพทย์ ชั้นปีที่ 4</option>
              <option value="นพท. ปี 5">นิสิตแพทย์ ชั้นปีที่ 5</option>
              <option value="นพท. ปี 6">นิสิตแพทย์ ชั้นปีที่ 6</option>
              <option value="แพทย์เพิ่มพูนทักษะ">แพทย์เพิ่มพูนทักษะ (Intern)</option>
              <option value="แพทย์ใช้ทุน">แพทย์ใช้ทุน</option>
              <option value="แพทย์พี่เลี้ยง">แพทย์พี่เลี้ยง</option>
              <option value="แพทย์ประจำบ้าน">แพทย์ประจำบ้าน (Resident)</option>
              <option value="อาจารย์แพทย์">อาจารย์แพทย์ (Staff)</option>
              <option value="เจ้าหน้าที่อื่นๆ">เจ้าหน้าที่อื่นๆ</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="absolute bottom-0 w-full p-4 bg-white/80 backdrop-blur-md border-t border-slate-100 z-20"><button
        id="btn-register"
        class="w-full bg-medical-700 hover:bg-medical-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition">ยืนยันการลงทะเบียน</button>
    </div>
  </div>

  <div class="app-container w-full max-w-md bg-slate-50 min-h-screen shadow-2xl relative flex flex-col hidden"
    id="checkinView">
    <div
      class="bg-medical-700 text-white p-5 rounded-b-[2rem] shadow-md relative z-10 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img id="chk-profile-img" src="https://via.placeholder.com/100"
          class="w-12 h-12 rounded-full border-2 border-white/50 object-cover shadow-sm bg-white">
        <div>
          <h2 id="chk-name" class="font-bold text-base truncate max-w-[200px]">-</h2>
          <p id="chk-details" class="text-[10px] text-medical-100">-</p>
        </div>
      </div>
      <div class="text-right">
        <div id="headerTime" class="font-black text-xl tracking-wider">--:--:--</div>
        <div id="headerDate" class="text-[10px] text-medical-100 font-medium mt-0.5">--/--/----</div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-5 pb-24">
      <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100">

        <div
          class="relative bg-slate-200 rounded-[2rem] overflow-hidden aspect-[3/4] shadow-inner border-[6px] border-white mb-6">
          <video id="chk-camera-preview" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline
            webkit-playsinline muted></video>

          <div
            class="absolute top-4 left-4 bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2 z-10 cursor-pointer hover:bg-black/70 transition"
            onclick="openMapModal()">
            <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
            <span class="text-white text-[10px] font-bold"><i
                class="fas fa-map-marker-alt text-emerald-400 mr-1"></i>ดูแผนที่พิกัด</span>
          </div>

          <div class="absolute bottom-4 right-4 flex gap-2 z-10">
            <button onclick="toggleMirror('chk')"
              class="bg-black/30 hover:bg-black/50 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-lg border border-white/20">
              <i class="fas fa-arrows-alt-h"></i>
            </button>
            <button onclick="switchCamera('chk')"
              class="bg-black/30 hover:bg-black/50 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-lg border border-white/20">
              <i class="fas fa-sync-alt"></i>
            </button>
          </div>
        </div>

        <div class="px-1">
          <label
            class="block text-xs font-bold text-slate-500 mb-2 pl-1 uppercase tracking-wider">ประเภทการลงเวลา</label>
          <div class="grid grid-cols-3 gap-2 mb-3">
            <div><input type="radio" id="job-ward" name="job-type" value="ราว ward" class="hidden" checked><label
                for="job-ward"
                class="cursor-pointer border border-slate-200 bg-white text-slate-600 py-2.5 rounded-xl w-full flex items-center justify-center font-bold text-sm shadow-sm transition">ราว
                ward</label></div>
            <div><input type="radio" id="job-in" name="job-type" value="เข้าเวร" class="hidden"><label for="job-in"
                class="cursor-pointer border border-slate-200 bg-white text-slate-600 py-2.5 rounded-xl w-full flex items-center justify-center font-bold text-sm shadow-sm transition">เข้าเวร</label>
            </div>
            <div><input type="radio" id="job-out" name="job-type" value="ออกเวร" class="hidden"><label for="job-out"
                class="cursor-pointer border border-slate-200 bg-white text-slate-600 py-2.5 rounded-xl w-full flex items-center justify-center font-bold text-sm shadow-sm transition">ออกเวร</label>
            </div>
          </div>

          <div class="relative mt-4">
            <div class="absolute inset-y-0 left-0 pl-3.5 pt-3 pointer-events-none text-slate-400"><i
                class="fas fa-comment-dots"></i></div>
            <textarea id="chk-note"
              class="w-full bg-slate-50 border border-slate-200 pl-10 p-3 rounded-xl text-sm focus:border-medical-500 outline-none transition resize-none font-medium text-slate-700"
              rows="2" placeholder="ระบุหมายเหตุ (ถ้ามี)"></textarea>
          </div>
        </div>

      </div>
    </div>

    <div class="absolute bottom-0 w-full p-4 bg-white/90 backdrop-blur-xl border-t border-slate-100 z-20">
      <button id="btn-checkin"
        class="w-full bg-gradient-to-r from-medical-600 to-medical-700 text-white font-bold text-lg py-4 rounded-2xl shadow-[0_8px_20px_rgba(20,184,166,0.3)] hover:shadow-[0_8px_25px_rgba(20,184,166,0.4)] transition transform hover:-translate-y-0.5 flex items-center justify-center">
        <i class="fas fa-fingerprint text-2xl mr-2"></i> บันทึกเวลา
      </button>
    </div>
  </div>

  <div id="mapModal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeMapModal()"></div>
    <div id="mapModalContent"
      class="absolute bottom-0 inset-x-0 bg-white rounded-t-[2rem] transform translate-y-full transition-transform duration-300 flex flex-col h-[85vh]">
      <div class="flex justify-center pt-4 pb-2">
        <div class="w-16 h-1.5 bg-slate-200 rounded-full"></div>
      </div>
      <div class="p-5 flex-1 flex flex-col min-h-0">
        <div class="flex justify-between items-end mb-4">
          <div>
            <h3 class="text-xl font-bold text-slate-800">แผนที่พิกัด</h3>
            <p id="mapDistanceText" class="text-xs text-slate-500 font-medium mt-1">กำลังคำนวณระยะห่าง...</p>
          </div>
          <button onclick="closeMapModal()"
            class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center transition"><i
              class="fas fa-times text-lg"></i></button>
        </div>
        <div class="flex-1 rounded-3xl overflow-hidden border-4 border-white shadow-md relative bg-slate-100">
          <div id="map" class="absolute inset-0 w-full h-full"></div>
        </div>
        <button onclick="closeMapModal()"
          class="w-full mt-5 bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-md transition">ปิดแผนที่</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <style>
    input[type="radio"]:checked+label {
      background-color: #0f766e;
      color: white;
      border-color: #0f766e;
      box-shadow: 0 4px 6px -1px rgba(15, 118, 110, 0.2);
    }
  </style>
</body>

</html>
